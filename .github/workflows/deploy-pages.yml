name: 🌐 Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# O singură instanță de deployment simultan
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build + Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 📥 Descarcă codul
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalează dependențele
        working-directory: frontend
        run: npm ci

      - name: 🔨 Build
        working-directory: frontend
        env:
          # URL-ul API-ului tău Fly.io (ex: https://shopping-bot-app.fly.dev)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE: /shopping-bot/
        run: npm run build

      - name: ⚙️ Configurează Pages
        uses: actions/configure-pages@v4

      - name: 📤 Încarcă artefactul
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: 🚀 Deploy pe GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
